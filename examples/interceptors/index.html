<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <title>@zhiaiwan/axios - interceptors</title>
  <link rel="stylesheet" href="../shared.css">
</head>
<body>
  <div class="page">
    <div class="page-header">
      <h1>自定义拦截器</h1>
      <p>配置时注册 + 运行时动态添加/移除拦截器</p>
    </div>

    <div class="card">
      <div class="btn-group">
        <button id="sendBtn" class="btn btn-primary">发送请求</button>
        <button id="addBtn" class="btn btn-success">添加动态拦截器</button>
        <button id="addResBtn" class="btn btn-success">添加动态响应拦截器</button>
        <button id="removeBtn" class="btn btn-danger" disabled>移除动态拦截器</button>
        <button id="removeResBtn" class="btn btn-danger" disabled>移除动态响应拦截器</button>
      </div>

      <div class="label mt-lg">拦截器日志</div>
      <div id="iLog" class="log"></div>

      <div class="label mt-md">响应结果</div>
      <div id="output" class="output"></div>
    </div>
  </div>

  <script type="importmap">
    { "imports": { "axios": "../../node_modules/axios/dist/esm/axios.min.js", "@zhiaiwan/axios": "../../dist/index.js" } }
  </script>
  <script type="module">
    import { createAxios } from '@zhiaiwan/axios'

    const iLog = document.getElementById('iLog')
    const output = document.getElementById('output')
    const logI = (m) => { iLog.textContent = `[${new Date().toLocaleTimeString()}] ${m}\n` + iLog.textContent }

    const http = createAxios({
      successCode: [0],
      requestInterceptors: [
        (cfg) => { cfg.headers.set('X-App-Version', '1.0.0'); logI('[REQ] injected X-App-Version'); return cfg },
      ],
      responseInterceptors: [
        (res) => { const t = res.headers['x-response-time']; if (t) logI('[RES] X-Response-Time: ' + t); return res },
      ],
    })

    document.getElementById('sendBtn').onclick = async () => {
      try { const r = await http.get('/interceptors/server'); output.textContent = JSON.stringify(r, null, 2) }
      catch (e) { output.textContent = 'Error: ' + e.message }
    }

    let dispose = null
    let disposeRes = null
    document.getElementById('addBtn').onclick = () => {
      dispose = http.onRequest((cfg) => { cfg.headers.set('X-Dynamic', 'hello'); logI('[DYNAMIC] injected X-Dynamic'); return cfg })
      logI('Dynamic interceptor added')
      document.getElementById('addBtn').disabled = true
      document.getElementById('removeBtn').disabled = false
    }
    document.getElementById('addResBtn').onclick = () => {
      disposeRes = http.onResponse((res) => { logI('[DYNAMIC RES] status=' + res.status); return res })
      logI('Dynamic response interceptor added')
      document.getElementById('addResBtn').disabled = true
      document.getElementById('removeResBtn').disabled = false
    }
    document.getElementById('removeBtn').onclick = () => {
      if (dispose) { dispose(); dispose = null; logI('Dynamic interceptor removed') }
      document.getElementById('addBtn').disabled = false
      document.getElementById('removeBtn').disabled = true
    }
    document.getElementById('removeResBtn').onclick = () => {
      if (disposeRes) { disposeRes(); disposeRes = null; logI('Dynamic response interceptor removed') }
      document.getElementById('addResBtn').disabled = false
      document.getElementById('removeResBtn').disabled = true
    }
  </script>
</body>
</html>
